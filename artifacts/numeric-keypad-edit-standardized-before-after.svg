<svg width="1600" height="980" viewBox="0 0 1600 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>Numeric keypad edit flow before and after</title>
  <rect width="1600" height="980" fill="#0F1A0D"/>
  <rect x="32" y="32" width="1536" height="916" rx="32" fill="#141F12" stroke="rgba(255,255,255,0.08)"/>
  <text x="80" y="110" fill="#F0EDDC" font-family="Arial, sans-serif" font-size="36" font-weight="700">Faithful mock: numeric score edit flow</text>
  <text x="80" y="150" fill="#A8B8A4" font-family="Arial, sans-serif" font-size="20">Scenario: 3-player game, reopening Alice&apos;s Carré score from 18 to correct it mid-session.</text>

  <g transform="translate(80 220)">
    <rect width="680" height="640" rx="28" fill="#1D2B1A" stroke="#FFE566" stroke-width="2"/>
    <rect width="680" height="72" rx="28" fill="#FFE566"/>
    <text x="32" y="45" fill="#0F1A0D" font-family="Arial, sans-serif" font-size="24" font-weight="700">Before</text>
    <text x="180" y="45" fill="#0F1A0D" font-family="Arial, sans-serif" font-size="18">First digit silently replaces the old score</text>

    <rect x="32" y="108" width="616" height="80" rx="22" fill="#141F12" stroke="rgba(255,255,255,0.14)"/>
    <text x="56" y="140" fill="#93C5FD" font-family="Arial, sans-serif" font-size="16" font-weight="700">ALICE · CARRÉ</text>
    <text x="56" y="170" fill="#A8B8A4" font-family="Arial, sans-serif" font-size="18">Valeur actuelle : 18 · touchez un chiffre pour remplacer</text>

    <rect x="32" y="214" width="616" height="118" rx="24" fill="#141F12" stroke="rgba(255,255,255,0.16)"/>
    <text x="72" y="292" fill="#F0EDDC" font-family="Arial, sans-serif" font-size="84" font-weight="700">18</text>
    <text x="570" y="290" fill="#A8B8A4" font-family="Arial, sans-serif" font-size="24">pts</text>

    <text x="32" y="386" fill="#F9A8D4" font-family="Arial, sans-serif" font-size="22" font-weight="700">Typical mistake during live play</text>
    <text x="32" y="422" fill="#F0EDDC" font-family="Arial, sans-serif" font-size="20">Player wants to change 18 to 12, taps `1`, and the score instantly becomes `1`.</text>

    <rect x="32" y="470" width="188" height="72" rx="18" fill="#253B22" stroke="rgba(255,255,255,0.12)"/>
    <text x="116" y="516" text-anchor="middle" fill="#F0EDDC" font-family="Arial, sans-serif" font-size="28" font-weight="700">tap 1</text>

    <path d="M244 506H372" stroke="#F9A8D4" stroke-width="4" stroke-linecap="round"/>
    <path d="M348 488L382 506L348 524" stroke="#F9A8D4" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="404" y="470" width="244" height="72" rx="18" fill="#3A101F" stroke="#F9A8D4"/>
    <text x="526" y="516" text-anchor="middle" fill="#F9A8D4" font-family="Arial, sans-serif" font-size="28" font-weight="700">unexpected overwrite: 1</text>

    <text x="32" y="604" fill="#A8B8A4" font-family="Arial, sans-serif" font-size="18">Result: the control behaves unlike normal editing, so corrections are easy to botch when the phone changes hands.</text>
  </g>

  <g transform="translate(840 220)">
    <rect width="680" height="640" rx="28" fill="#1D2B1A" stroke="#A8E6A3" stroke-width="2"/>
    <rect width="680" height="72" rx="28" fill="#A8E6A3"/>
    <text x="32" y="45" fill="#0F1A0D" font-family="Arial, sans-serif" font-size="24" font-weight="700">After</text>
    <text x="164" y="45" fill="#0F1A0D" font-family="Arial, sans-serif" font-size="18">Existing scores edit like a normal keypad field</text>

    <rect x="32" y="108" width="616" height="80" rx="22" fill="#141F12" stroke="rgba(255,255,255,0.14)"/>
    <text x="56" y="140" fill="#93C5FD" font-family="Arial, sans-serif" font-size="16" font-weight="700">ALICE · CARRÉ</text>
    <text x="56" y="170" fill="#A8B8A4" font-family="Arial, sans-serif" font-size="18">Valeur actuelle : 18 · utilisez ⌫ pour corriger</text>

    <rect x="32" y="214" width="616" height="118" rx="24" fill="#141F12" stroke="rgba(255,255,255,0.16)"/>
    <text x="72" y="292" fill="#F0EDDC" font-family="Arial, sans-serif" font-size="84" font-weight="700">18</text>
    <text x="570" y="290" fill="#A8B8A4" font-family="Arial, sans-serif" font-size="24">pts</text>

    <text x="32" y="386" fill="#A8E6A3" font-family="Arial, sans-serif" font-size="22" font-weight="700">Correction path is explicit</text>
    <text x="32" y="422" fill="#F0EDDC" font-family="Arial, sans-serif" font-size="20">Player taps `⌫`, then `2`, and the score changes from `18` to `12` without any hidden mode switch.</text>

    <rect x="32" y="470" width="188" height="72" rx="18" fill="#253B22" stroke="rgba(255,255,255,0.12)"/>
    <text x="126" y="516" text-anchor="middle" fill="#F0EDDC" font-family="Arial, sans-serif" font-size="28" font-weight="700">tap ⌫</text>

    <path d="M244 506H330" stroke="#A8E6A3" stroke-width="4" stroke-linecap="round"/>
    <path d="M306 488L340 506L306 524" stroke="#A8E6A3" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="360" y="470" width="120" height="72" rx="18" fill="#253B22" stroke="rgba(255,255,255,0.12)"/>
    <text x="420" y="516" text-anchor="middle" fill="#F0EDDC" font-family="Arial, sans-serif" font-size="28" font-weight="700">1</text>

    <path d="M502 506H566" stroke="#A8E6A3" stroke-width="4" stroke-linecap="round"/>
    <path d="M542 488L576 506L542 524" stroke="#A8E6A3" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="596" y="470" width="52" height="72" rx="18" fill="#253B22" stroke="rgba(255,255,255,0.12)"/>
    <text x="622" y="516" text-anchor="middle" fill="#F0EDDC" font-family="Arial, sans-serif" font-size="28" font-weight="700">2</text>

    <rect x="32" y="580" width="616" height="84" rx="20" fill="#102012" stroke="rgba(168,230,163,0.35)"/>
    <text x="56" y="632" fill="#A8E6A3" font-family="Arial, sans-serif" font-size="22" font-weight="700">Change made in code</text>
    <text x="56" y="660" fill="#F0EDDC" font-family="Arial, sans-serif" font-size="18">Removed hidden replace-on-next-digit mode from the numeric keypad and updated the helper copy.</text>
  </g>
</svg>
